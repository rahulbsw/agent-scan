version: 2.1

orbs:
  slack: circleci/slack@4.12.5

parameters:
  run-daily-security-scan:
    description: When true, runs the daily security-scans workflow (used by scheduled trigger).
    type: boolean
    default: false

commands:
  notify_slack_on_failure:
    steps:
      - slack/notify:
          branch_pattern: main
          channel: agent-scan-alerting
          event: fail
          custom: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "CICD pipeline failed :circleci-fail:",
                    "emoji": true
                  }
                },
                {
                  "type": "divider"
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Project*: ${CIRCLE_PROJECT_REPONAME}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Job*: ${CIRCLE_JOB}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch*: ${CIRCLE_BRANCH}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Author*: ${CIRCLE_USERNAME}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": " "
                    }
                  ],
                  "accessory": {
                    "type": "button",
                    "text": {
                      "type": "plain_text",
                      "emoji": true,
                      "text": "View Job"
                    },
                    "value": "${CIRCLE_BUILD_URL}"
                  }
                }
              ]
            }

jobs:
  security-scans:
    resource_class: small
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout
      - run:
          name: Update uv
          command: curl -LsSf https://astral.sh/uv/install.sh | sh
      - run:
          name: Install project dependencies
          command: ~/.local/bin/uv sync --all-extras
      - run:
          name: Python dependency audit
          command: ~/.local/bin/uv run --with pip-audit pip-audit --strict
      - run:
          name: Secret scan
          command: ~/.local/bin/uv run detect-secrets scan --all-files --exclude-files '^tests/skills/'
      - notify_slack_on_failure

workflows:
  version: 2
  CICD:
    jobs:
      - security-scans:
          name: Security Scans
          context:
            - security-alerting


  daily-security-scan:
    when: << pipeline.parameters.run-daily-security-scan >>
    jobs:
      - security-scans:
          name: Daily Security Scans
          context:
            - security-alerting
