name: Fork Release

on:
  push:
    tags:
      - "fork-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing fork release tag, for example fork-v0.5.14.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare-release:
    name: prepare release
    runs-on: ubuntu-latest
    outputs:
      checkout_ref: ${{ steps.resolve.outputs.checkout_ref }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
    steps:
      - name: Resolve release inputs
        id: resolve
        shell: bash
        env:
          RAW_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail

          raw_tag="${RAW_TAG#refs/tags/}"
          raw_tag="${raw_tag#refs/heads/}"

          case "$raw_tag" in
            fork=v*)
              checkout_ref="${raw_tag#fork=}"
              release_tag="fork-${checkout_ref}"
              ;;
            fork-v*)
              checkout_ref="$raw_tag"
              release_tag="$raw_tag"
              ;;
            v*)
              checkout_ref="$raw_tag"
              release_tag="fork-${raw_tag}"
              ;;
            *)
              echo "::error::Release tag must be fork-v<version> or v<version>. Got: $raw_tag"
              exit 1
              ;;
          esac

          echo "checkout_ref=$checkout_ref" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

  validate-ref:
    name: validate release ref
    runs-on: ubuntu-latest
    needs: prepare-release
    steps:
      - uses: actions/checkout@v4
      - name: Confirm checkout ref exists
        env:
          CHECKOUT_REF: ${{ needs.prepare-release.outputs.checkout_ref }}
        run: |
          set -euo pipefail

          if ! git ls-remote --exit-code origin "refs/tags/$CHECKOUT_REF" >/dev/null; then
            echo "::error::Release source tag '$CHECKOUT_REF' does not exist in this repository."
            exit 1
          fi

  build-binaries:
    name: binary (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs:
      - prepare-release
      - validate-ref
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            ext: ""
          - os: ubuntu-24.04-arm
            target: linux-arm64
            ext: ""
          - os: macos-latest
            target: macos-arm64
            ext: ""
          - os: macos-15-intel
            target: macos-x64
            ext: ""
          - os: windows-latest
            target: windows-x64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.checkout_ref }}
      - uses: astral-sh/setup-uv@v6
      - name: Build standalone binary
        run: make binary
      - name: Stage release asset
        shell: bash
        env:
          BINARY_PATH: dist/agent-scan${{ matrix.ext }}
          ASSET_NAME: agent-scan-${{ needs.prepare-release.outputs.release_tag }}-${{ matrix.target }}${{ matrix.ext }}
        run: |
          mkdir -p release-assets
          cp "$BINARY_PATH" "release-assets/$ASSET_NAME"
      - uses: actions/upload-artifact@v4
        with:
          name: agent-scan-${{ matrix.target }}
          path: release-assets/*
          if-no-files-found: error

  build-python-package:
    name: python package
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - validate-ref
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.checkout_ref }}
      - uses: astral-sh/setup-uv@v6
      - name: Build wheel and source distribution
        run: make build
      - name: Stage release assets
        run: |
          mkdir -p release-assets
          cp dist/*.whl dist/*.tar.gz release-assets/
      - uses: actions/upload-artifact@v4
        with:
          name: agent-scan-python-package
          path: release-assets/*
          if-no-files-found: error

  publish-release:
    name: publish release
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - build-binaries
      - build-python-package
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.checkout_ref }}
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - name: Generate checksums
        working-directory: release-assets
        run: sha256sum * > sha256sums.txt
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
        run: |
          set -euo pipefail

          case "$RELEASE_TAG" in
            fork-v*) ;;
            *) echo "Release tag must start with fork-v"; exit 1 ;;
          esac

          target_sha="$(git rev-parse HEAD)"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-assets/* --clobber
          else
            gh release create "$RELEASE_TAG" release-assets/* --title "Agent Scan $RELEASE_TAG" --target "$target_sha" --generate-notes
          fi
